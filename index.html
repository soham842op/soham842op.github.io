function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  const setTweak = React.useCallback((key, val) => {
    setValues((prev) => ({ ...prev, [key]: val }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { [key]: val } }, '*');
  }, []);
  return [values, setTweak];
}

function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel"
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">{children}</div>
      </div>
    </>
  );
}

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;
  const valueRef = React.useRef(value);
  valueRef.current = value;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

function TweakColor({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <input type="color" className="twk-swatch" value={value}
             onChange={(e) => onChange(e.target.value)} />
    </div>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});
</script>

<script type="text/babel">

(function injectIntroCSS(){
  if (document.getElementById('intro-css')) return;
  const css = `
  /* ── ROOT ── */
  .intro-root {
    position: fixed; inset: 0; z-index: 100; overflow: hidden;
    background: #050403;
    transition: opacity .8s ease;
  }
  .intro-root.exiting { opacity: 0; pointer-events: none; }

  /* ── BACKGROUND ── */
  .intro-bg {
    position: absolute; inset: 0; z-index: 0;
    background:
      radial-gradient(ellipse 90% 70% at 50% 50%, rgba(18,9,6,.88), transparent 65%),
      radial-gradient(ellipse 110% 90% at 15% -5%, rgba(10,5,3,.72), transparent 55%),
      radial-gradient(ellipse 100% 80% at 100% 110%, rgba(8,4,2,.5),  transparent 55%),
      #050403;
    opacity: 0; animation: itrBgIn .9s ease forwards;
  }
  @keyframes itrBgIn { to { opacity: 1; } }

  .intro-grain {
    position: absolute; inset: 0; z-index: 1; pointer-events: none;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 .97  0 0 0 0 .94  0 0 0 0 .88  0 0 0 .055 0'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
    opacity: .5; mix-blend-mode: overlay;
  }

  /*
   * ── 4-PIECE SHARDS ────────────────────────────────────────────────────────
   * Two cuts form an X crossing at screen-centre (50%, 50%).
   * Each cut goes from y=20% on its entry edge to y=80% on the exit edge.
   *
   *   Cut 1 (right→left): enters right-edge at y≈23%, exits left-edge at y≈77%
   *   Cut 2 (left→right): enters left-edge at y≈23%, exits right-edge at y≈77%
   *
   * The four dark panels cover the whole screen seamlessly before the split.
   * On split, they fly: top-up, bottom-down, left-left, right-right.
   * ─────────────────────────────────────────────────────────────────────── */
  .shards-wrap { position: absolute; inset: 0; z-index: 2; pointer-events: none; }
  .shard {
    position: absolute; inset: 0; background: #050403;
    will-change: transform, opacity;
    transition: transform 1.05s cubic-bezier(.5,0,.7,.45), opacity .68s ease .22s;
  }
  /* top panel: pentagon above both cut lines */
  .shard-t {
    clip-path: polygon(0 0, 100% 0, 100% 23%, 50% 50%, 0 23%);
    transform-origin: 50% 0;
  }
  /* bottom panel: pentagon below both cut lines */
  .shard-b {
    clip-path: polygon(0 77%, 50% 50%, 100% 77%, 100% 100%, 0 100%);
    transform-origin: 50% 100%;
  }
  /* left triangle: left quadrant of the X */
  .shard-l {
    clip-path: polygon(0 23%, 50% 50%, 0 77%);
    transform-origin: 0 50%;
  }
  /* right triangle: right quadrant of the X */
  .shard-r {
    clip-path: polygon(100% 23%, 100% 77%, 50% 50%);
    transform-origin: 100% 50%;
  }
  .shards-wrap.split .shard-t { transform: translateY(-128%) rotate(-1.5deg); opacity: 0; }
  .shards-wrap.split .shard-b { transform: translateY(128%)  rotate(1.5deg);  opacity: 0; }
  .shards-wrap.split .shard-l { transform: translateX(-128%) rotate(1.5deg);  opacity: 0; }
  .shards-wrap.split .shard-r { transform: translateX(128%)  rotate(-1.5deg); opacity: 0; }

  /* ── CANVASES — one per blade, above the shards ── */
  .intro-canvas { position: absolute; inset: 0; z-index: 3; pointer-events: none; }

  /* ── GLINT ─ rg = right-edge entry, lg = left-edge entry ── */
  .intro-glint {
    position: absolute; z-index: 3;
    width: 20px; height: 20px; border-radius: 50%;
    top: calc(20% - 10px);
    background: radial-gradient(circle, white, rgba(255,242,185,.75) 44%, transparent);
    box-shadow:
      0 0 28px 10px rgba(255,255,255,.6),
      0 0 72px 24px rgba(255,210,110,.28);
    animation: glintPop .24s ease-out forwards;
  }
  .intro-glint.rg { right: 0; left: auto;  transform: translateX(50%);  }
  .intro-glint.lg { left:  0; right: auto; transform: translateX(-50%); }
  @keyframes glintPop {
    from { opacity: 0; }
    to   { opacity: 1; }
  }

  /* ── CUT LINES ── */
  .intro-cut {
    position: absolute; inset: 0; width: 100%; height: 100%;
    z-index: 4; pointer-events: none;
  }
  @keyframes cutDraw { to { stroke-dashoffset: 0; } }
  @keyframes cutCool {
    0%   { stroke: white;               opacity: 1;  }
    18%  { stroke: #fff5d0;             opacity: 1;  }
    44%  { stroke: #ff9060;             opacity: .96;}
    73%  { stroke: #d94a37;             opacity: .9; }
    100% { stroke: rgba(217,74,55,.22); opacity: .3; }
  }

  /* ── IMPACT FLASH ── */
  .intro-flash {
    position: absolute; inset: 0; z-index: 5;
    background: white; opacity: 0; pointer-events: none;
  }
  .intro-flash.active { animation: impactFlash .46s ease-out forwards; }
  @keyframes impactFlash {
    0%   { opacity: .92; }
    28%  { opacity: .42; }
    100% { opacity: 0;   }
  }

  /* ── SPARKS ── */
  .intro-spark {
    position: absolute; left: 50%; top: 50%;
    border-radius: 50%; z-index: 5; pointer-events: none;
    transform: translate(-50%,-50%);
    background: radial-gradient(circle at 40% 35%, #fffbe0, #ffb050 48%, #d94a37);
    box-shadow: 0 0 5px 2px rgba(255,165,60,.45);
    animation: sparkFly .7s cubic-bezier(.1,.72,.2,1) forwards;
  }
  @keyframes sparkFly {
    0%   { opacity: 0; transform: translate(-50%,-50%) scale(0); }
    10%  { opacity: 1; transform: translate(-50%,-50%) scale(1); }
    100% { opacity: 0; transform: translate(calc(-50% + var(--dx)), calc(-50% + var(--dy))) scale(.22); }
  }

  /* ── WORDMARK ── */
  .wm-wrap {
    position: absolute; inset: 0; z-index: 6; pointer-events: none;
    display: flex; flex-direction: column;
    justify-content: center; align-items: center;
    animation: wmUp .62s cubic-bezier(.18,.8,.2,1) forwards;
  }
  @keyframes wmUp {

  .wm-name {
    font-family: 'Fraunces', serif;

  .wm-name .wm-red { color: var(--red); }
  .wm-rule {
    width: clamp(150px, 34vw, 460px); height: 1.5px; margin-top: 22px;
    background: linear-gradient(90deg, transparent, var(--red) 16%, #ff7055 50%, var(--red) 84%, transparent);
    box-shadow: 0 0 20px rgba(217,74,55,.48);
    animation: wmRuleIn .44s cubic-bezier(.2,.8,.2,1) .18s both;

  @keyframes wmRuleIn {

  .wm-sub {

  @keyframes wmSubIn {

  /* ── CORNERS ── */
  .itr-corner {

    animation: itrFadeIn .56s ease forwards;
  }
  .itr-corner.tl { top: 30px; left: 34px; }
  .itr-corner.tr { top: 30px; right: 34px; color: var(--red); }

  .itr-corner.br { bottom: 30px; right: 34px; text-align: right; line-height: 1.75; }

    display: inline-block; width: 7px; height: 7px;

    margin-right: 9px; vertical-align: middle;
  }
  .itr-fc {
    position: absolute; width: 34px; height: 34px; z-index: 6;
    border: 1px solid rgba(240,233,219,.28);
    animation: itrFadeIn .56s ease .1s both;
  }
  .itr-fc.tl { top: 20px; left: 20px; border-right: 0; border-bottom: 0; }
  .itr-fc.tr { top: 20px; right: 20px; border-left: 0; border-bottom: 0; }
  .itr-fc.bl { bottom: 20px; left: 20px; border-right: 0; border-top: 0; }
  .itr-fc.br { bottom: 20px; right: 20px; border-left: 0; border-top: 0; }
  @keyframes itrFadeIn { from { opacity: 0; } to { opacity: 1; } }
  `;
  const s = document.createElement('style');
  s.id = 'intro-css';
  s.textContent = css;
  document.head.appendChild(s);
})();

function Intro({ onDone }) {
  const canvas1Ref  = React.useRef(null);
  const canvas2Ref  = React.useRef(null);
  const doneRef     = React.useRef(false);

  const [glint,       setGlint]       = React.useState(null); // null | 'rg' | 'lg'
  const [flashKey,    setFlashKey]    = React.useState(0);
  const [showCut,     setShowCut]     = React.useState(false);
  const [sparking,    setSparking]    = React.useState(false);
  const [splitting,   setSplitting]   = React.useState(false);
  const [showWM,      setShowWM]      = React.useState(false);
  const [showCorners, setShowCorners] = React.useState(false);
  const [exiting,     setExiting]     = React.useState(false);

  /* ─ blade sweep — parameterised entry/exit coords for both blades ────── */
  const sweepBlade = React.useCallback(function(canvasRef, x0frac, y0frac, x1frac, y1frac) {
    var canvas = canvasRef.current;
    if (!canvas) return;
    var ctx = canvas.getContext('2d');
    var W = canvas.width, H = canvas.height;
    var x0 = W * x0frac, y0 = H * y0frac;
    var x1 = W * x1frac, y1 = H * y1frac;
    var DUR = 148;
    var trail = [];
    var start = performance.now();

    function drawTrail() {
      ctx.clearRect(0, 0, W, H);
      if (trail.length < 2) return;
      for (var i = 1; i < trail.length; i++) {
        var frac = i / trail.length;
        var px = trail[i-1].x, py = trail[i-1].y;
        var cx = trail[i].x,   cy = trail[i].y;
        // Heat glow
        ctx.beginPath(); ctx.moveTo(px, py); ctx.lineTo(cx, cy);
        ctx.strokeStyle = '#d94a37'; ctx.lineWidth = 36;
        ctx.globalAlpha = frac * 0.13;
        ctx.shadowBlur = 20; ctx.shadowColor = '#d94a37';
        ctx.stroke();
        // Warm shimmer
        var g1 = ctx.createLinearGradient(px, py, cx, cy);
        g1.addColorStop(0,    'transparent');
        g1.addColorStop(0.42, 'rgba(255,218,110,.92)');
        g1.addColorStop(1,    'rgba(255,252,220,.88)');
        ctx.beginPath(); ctx.moveTo(px, py); ctx.lineTo(cx, cy);
        ctx.strokeStyle = g1; ctx.lineWidth = 11;
        ctx.globalAlpha = frac * 0.9; ctx.shadowBlur = 0;
        ctx.stroke();
        // Bright core
        ctx.beginPath(); ctx.moveTo(px, py); ctx.lineTo(cx, cy);
        ctx.strokeStyle = 'rgba(255,252,215,' + frac + ')';
        ctx.lineWidth = 2.5; ctx.globalAlpha = frac;
        ctx.stroke();
      }
      // Tip glow
      if (trail.length) {
        var tip = trail[trail.length - 1];
        var rg = ctx.createRadialGradient(tip.x, tip.y, 0, tip.x, tip.y, 44);
        rg.addColorStop(0,    'rgba(255,255,255,1)');
        rg.addColorStop(0.18, 'rgba(255,242,165,.92)');
        rg.addColorStop(0.52, 'rgba(255,100,25,.46)');
        rg.addColorStop(1,    'transparent');
        ctx.globalAlpha = 1; ctx.shadowBlur = 0;
        ctx.fillStyle = rg;
        ctx.beginPath(); ctx.arc(tip.x, tip.y, 44, 0, Math.PI * 2); ctx.fill();
      }
      ctx.globalAlpha = 1; ctx.shadowBlur = 0;
    }

    function frame(now) {
      var t = Math.min((now - start) / DUR, 1);
      var e = t < 0.5 ? 4*t*t*t : 1 - Math.pow(-2*t+2, 3) / 2;
      trail.push({ x: x0 + (x1-x0)*e, y: y0 + (y1-y0)*e });
      if (trail.length > 16) trail.shift();
      drawTrail();
      if (t < 1) { requestAnimationFrame(frame); return; }
      // Fade trail out over 200ms
      var fs = performance.now();
      function fade(fn) {
        var ft = Math.min((fn - fs) / 200, 1);
        ctx.clearRect(0, 0, W, H);
        for (var i = 1; i < trail.length; i++) {
          var frac = (i / trail.length) * (1 - ft);
          if (frac <= 0.01) continue;
          ctx.beginPath();
          ctx.moveTo(trail[i-1].x, trail[i-1].y);
          ctx.lineTo(trail[i].x, trail[i].y);
          ctx.strokeStyle = 'rgba(255,252,215,' + frac + ')';
          ctx.lineWidth = 2.5; ctx.globalAlpha = frac;
          ctx.stroke(); ctx.globalAlpha = 1;
        }
        if (ft < 1) requestAnimationFrame(fade);
        else ctx.clearRect(0, 0, W, H);
      }
      requestAnimationFrame(fade);
    }
    requestAnimationFrame(frame);
  }, []);

  /* ─ orchestration ────────────────────────────────────────────────────── */
  React.useEffect(function() {
    [canvas1Ref, canvas2Ref].forEach(function(ref) {
      if (ref.current) {
        ref.current.width  = window.innerWidth;
        ref.current.height = window.innerHeight;
      }
    });

    var T = [];
    // Blade 1: glint at right edge, sweeps right→left
    T.push(setTimeout(function() { setGlint('rg'); },  300));
    T.push(setTimeout(function() {
      setGlint(null);
      sweepBlade(canvas1Ref, 1.05, 0.20, -0.05, 0.80);
    }, 500));
    // Blade 2: glint at left edge, sweeps left→right
    T.push(setTimeout(function() { setGlint('lg'); },  590));
    T.push(setTimeout(function() {
      setGlint(null);
      sweepBlade(canvas2Ref, -0.05, 0.20, 1.05, 0.80);
    }, 640));
    // Impact: both cuts visible + flash + sparks
    T.push(setTimeout(function() {
      setFlashKey(function(k) { return k + 1; });
      setSparking(true);
      setShowCut(true);
    }, 840));
    // Screen shatters in 4 directions
    T.push(setTimeout(function() { setSplitting(true);   }, 1420));
    // Identity rises from the centre
    T.push(setTimeout(function() { setShowWM(true);      }, 1820));
    T.push(setTimeout(function() { setShowCorners(true); }, 2040));
    // Exit
    T.push(setTimeout(function() { setExiting(true);     }, 3440));
    T.push(setTimeout(function() {
      if (!doneRef.current) { doneRef.current = true; if (onDone) onDone(); }
    }, 4200));

    return function() { T.forEach(clearTimeout); };
  }, [sweepBlade, onDone]);

  /* ─ sparks radiate from screen centre (X crosspoint) ───────────────── */
  var sparks = React.useMemo(function() {
    return Array.from({ length: 36 }, function(_, i) {
      var a    = (i / 36) * Math.PI * 2;
      var dist = 68 + (i % 5) * 30;
      return { dx: Math.cos(a)*dist, dy: Math.sin(a)*dist, size: 2.5+(i%4)*1.9, delay: (i%6)*12 };
    });
  }, []);

  /*
   * Cut lengths for lines spanning (105,20)→(-5,80) or (-5,20)→(105,80):
   *   dx = 110 viewBox units, dy = 60 viewBox units
   *   length = sqrt(110² + 60²) = sqrt(15700) ≈ 125.3 → use 126
   */
  var CUT_LEN = 126;

  return (
    <div className={"intro-root" + (exiting ? " exiting" : "")}>
      <div className="intro-bg"></div>
      <div className="intro-grain"></div>

      {/* Four dark shard panels — z:2, tile the entire screen before split */}
      <div className={"shards-wrap" + (splitting ? " split" : "")}>
        <div className="shard shard-t"></div>
        <div className="shard shard-b"></div>
        <div className="shard shard-l"></div>
        <div className="shard shard-r"></div>
      </div>

      {/* Glints + blade canvases — z:3, above shards */}
      {glint && <div className={"intro-glint " + glint}></div>}
      <canvas ref={canvas1Ref} className="intro-canvas"></canvas>
      <canvas ref={canvas2Ref} className="intro-canvas"></canvas>

      {/* Impact flash — z:5 */}
      <div key={"f" + flashKey}
           className={"intro-flash" + (flashKey > 0 ? " active" : "")}></div>

      {/* Sparks — z:5 */}
      {sparking && sparks.map(function(s, i) {
        return (
          <div key={i} className="intro-spark"
            style={{ "--dx": s.dx+"px", "--dy": s.dy+"px",
                     width: s.size+"px", height: s.size+"px",
                     animationDelay: s.delay+"ms" }} />
        );
      })}

      {/* X cut lines — z:4 */}
      {showCut && (
        <svg className="intro-cut" viewBox="0 0 100 100"
             preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <filter id="cg-blur" x="-60%" y="-300%" width="220%" height="700%">
              <feGaussianBlur stdDeviation="2.6"/>
            </filter>
          </defs>
          {/* Cut 1 — right→left (upper-right to lower-left) */}
          <line x1="105" y1="20" x2="-5" y2="80"
            stroke="rgba(217,74,55,.9)" strokeWidth="5.5" filter="url(#cg-blur)"/>
          <line x1="105" y1="20" x2="-5" y2="80"
            stroke="white" strokeWidth="1.2"
            strokeDasharray={CUT_LEN} strokeDashoffset={CUT_LEN}
            style={{ animation: "cutDraw .15s ease-out forwards, cutCool 2.6s ease .18s forwards" }}/>
          {/* Cut 2 — left→right (upper-left to lower-right) */}
          <line x1="-5" y1="20" x2="105" y2="80"
            stroke="rgba(217,74,55,.9)" strokeWidth="5.5" filter="url(#cg-blur)"/>
          <line x1="-5" y1="20" x2="105" y2="80"
            stroke="white" strokeWidth="1.2"
            strokeDasharray={CUT_LEN} strokeDashoffset={CUT_LEN}
            style={{ animation: "cutDraw .15s ease-out .14s forwards, cutCool 2.6s ease .32s forwards" }}/>
        </svg>
      )}

      {/* Wordmark — z:6, rises from the centre after the X split */}
      {showWM && (
        <div className="wm-wrap">
          <div className="wm-name">
            Soham Shah<span className="wm-red">.</span>
          </div>
          <div className="wm-rule"></div>
          <div className="wm-sub">Silent Engineer &middot; MS CS &middot; Arizona State</div>
        </div>
      )}

      {/* Corners — z:6 */}
      {showCorners && (
        <React.Fragment>
          <div className="itr-corner tl"><span className="cdot"></span>Dossier &middot; 01</div>
          <div className="itr-corner tr">// Live</div>
          <div className="itr-corner bl">33.4&deg;N &middot; 111.9&deg;W &middot; Tempe, AZ</div>
          <div className="itr-corner br">MMXXVI &middot; MS CS<br/>github.com/soham842op</div>
          <div className="itr-fc tl"></div>
          <div className="itr-fc tr"></div>
          <div className="itr-fc bl"></div>
          <div className="itr-fc br"></div>
        </React.Fragment>
      )}
    </div>
  );
}

window.Intro = Intro;
</script>

function useReveal(){
  React.useEffect(() => {
    const io = new IntersectionObserver((entries) => {
      entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('in'); });
    }, { threshold: 0.15 });
    document.querySelectorAll('.reveal, .skills').forEach(el => io.observe(el));
    return () => io.disconnect();
  }, []);
}

function ScrollProgress(){
  React.useEffect(() => {
    const bar = document.querySelector('.scroll-prog');
    const onScroll = () => {
      const h = document.documentElement;
      const p = (h.scrollTop / (h.scrollHeight - h.clientHeight)) * 100;
      if (bar) bar.style.setProperty('--p', p + '%');
    };
    window.addEventListener('scroll', onScroll, { passive:true });
    onScroll();
    return () => window.removeEventListener('scroll', onScroll);
  }, []);
  return <div className="scroll-prog"></div>;
}
